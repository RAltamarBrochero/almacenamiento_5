name: Deploy to Fly.io

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions@v1

      - name: Authenticate to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then echo "FLY_API_TOKEN secret is missing"; exit 1; fi
          flyctl auth login --access-token "$FLY_API_TOKEN"

      - name: Deploy image to Fly
        env:
          FLY_APP_NAME: ${{ secrets.FLY_APP_NAME }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/telegram-drive:latest
        run: |
          if [ -z "$FLY_APP_NAME" ]; then echo "FLY_APP_NAME secret is missing"; exit 1; fi
          flyctl deploy --app "$FLY_APP_NAME" --image "$IMAGE" --config ./Telegram-Drive/fly.toml

      - name: Verify site (basic)
        if: ${{ secrets.DOMAIN != '' }}
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          echo "Checking https://${DOMAIN}…"
          curl -fsS --max-time 30 "https://${DOMAIN}" || (echo "Healthcheck failed" && exit 1)
