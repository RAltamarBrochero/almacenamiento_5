name: Deploy to Render (trigger deploy)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Render secrets missing; skipping deploy"; exit 1;
          fi
          echo "Triggering Render deploy for service $RENDER_SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Verify site (basic)
        if: ${{ secrets.DOMAIN != '' }}
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          echo "Checking https://${DOMAIN}…"
          curl -fsS --max-time 30 "https://${DOMAIN}" || (echo "Healthcheck failed" && exit 1)
