version: '3.8'
services:
  stream:
    build:
      context: ./app/src-tauri
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - STREAM_PORT=${STREAM_PORT}
      - STREAM_TOKEN=${STREAM_TOKEN}
      - APP_DATA_DIR=${APP_DATA_DIR}
    volumes:
      - ./data:/data
    networks:
      - td-net

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/letsencrypt
      - ./letsencrypt/www:/var/www/letsencrypt
      - ./backups:/backups
    depends_on:
      - stream
    networks:
      - td-net

  certbot:
    image: certbot/certbot:v2.8.0
    env_file: .env
    volumes:
      - ./certs:/etc/letsencrypt
      - ./letsencrypt/www:/var/www/letsencrypt
    entrypoint: ["/bin/sh", "-c"]
    command: "trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew --webroot -w /var/www/letsencrypt --deploy-hook 'nginx -s reload' || true; done"
    networks:
      - td-net

networks:
  td-net:
    driver: bridge
